version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/adapter/postgres/queries/*.sql"
    schema: "internal/adapter/postgres/migrations/*.sql"
    gen:
      go:
        package: "postgres"
        out: "internal/adapter/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          - db_type: time
            go_type: time.Time
          - db_type: date
            go_type: time.Time
          - db_type: pg_catalog.time
            go_type: time.Time