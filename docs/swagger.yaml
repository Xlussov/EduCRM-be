definitions:
  admins.Request:
    properties:
      branch_ids:
        items:
          type: string
        type: array
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      phone:
        type: string
    required:
    - branch_ids
    - first_name
    - last_name
    - password
    - phone
    type: object
  admins.Response:
    properties:
      id:
        type: string
    type: object
  archive.Response:
    properties:
      message:
        type: string
    type: object
  get.Response:
    properties:
      address:
        type: string
      city:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  internal_branches_create.Request:
    properties:
      address:
        type: string
      city:
        type: string
      name:
        type: string
    required:
    - address
    - city
    - name
    type: object
  internal_branches_create.Response:
    properties:
      id:
        type: string
    type: object
  internal_subjects_create.Request:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  internal_subjects_create.Response:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  list.BranchResponse:
    properties:
      address:
        type: string
      city:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  login.Request:
    properties:
      password:
        type: string
      phone:
        type: string
    required:
    - password
    - phone
    type: object
  login.Response:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/login.UserDTO'
    type: object
  login.UserDTO:
    properties:
      branches:
        items:
          type: string
        type: array
      id:
        type: string
      role:
        type: string
    type: object
  refresh.Request:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  refresh.Response:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorDetail'
    type: object
  teachers.Request:
    properties:
      branch_id:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  teachers.Response:
    properties:
      id:
        type: string
    type: object
  update.Request:
    properties:
      address:
        type: string
      city:
        type: string
      name:
        type: string
    required:
    - address
    - city
    - name
    type: object
info:
  contact: {}
  description: Backend API for Educational Center Management System
  title: EduCRM API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/login.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/login.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/refresh.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/refresh.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Refresh Token
      tags:
      - auth
  /api/v1/branches:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: List of branches
          schema:
            items:
              $ref: '#/definitions/list.BranchResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List Branches
      tags:
      - branches
    post:
      consumes:
      - application/json
      parameters:
      - description: Branch details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_branches_create.Request'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_branches_create.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Branch
      tags:
      - branches
  /api/v1/branches/{id}:
    get:
      parameters:
      - description: Branch ID format(uuid)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Branch details
          schema:
            $ref: '#/definitions/get.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Branch by ID
      tags:
      - branches
    put:
      consumes:
      - application/json
      parameters:
      - description: Branch ID format(uuid)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Update branch details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/update.Request'
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Branch
      tags:
      - branches
  /api/v1/branches/{id}/archive:
    patch:
      parameters:
      - description: Branch ID format(uuid)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Archived
          schema:
            $ref: '#/definitions/archive.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Archive Branch
      tags:
      - branches
  /api/v1/subjects:
    post:
      consumes:
      - application/json
      parameters:
      - description: Subject details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_subjects_create.Request'
      produces:
      - application/json
      responses:
        "201":
          description: Created subject
          schema:
            $ref: '#/definitions/internal_subjects_create.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Subject
      tags:
      - subjects
  /api/v1/subjects/{id}/archive:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Subject ID format(uuid)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Archive Subject
      tags:
      - subjects
  /api/v1/users/admins:
    post:
      consumes:
      - application/json
      parameters:
      - description: Admin details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admins.Request'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/admins.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Admin
      tags:
      - users
  /api/v1/users/teachers:
    post:
      consumes:
      - application/json
      parameters:
      - description: Teacher details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/teachers.Request'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/teachers.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Teacher
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Insert the token in the following format: Bearer {your_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
